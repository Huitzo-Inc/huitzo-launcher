name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset: huitzo-x86_64-unknown-linux-musl
            cross: false
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            asset: huitzo-aarch64-unknown-linux-musl
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: huitzo-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: huitzo-aarch64-apple-darwin
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: huitzo-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # musl toolchain for static Linux builds
      - name: Install musl tools
        if: contains(matrix.target, 'musl') && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # Cross-compilation for Linux aarch64
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      # Determine binary name (huitzo on Unix, huitzo.exe on Windows)
      - name: Prepare artifact
        run: |
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cp target/${{ matrix.target }}/release/huitzo.exe ${{ matrix.asset }}
          else
            cp target/${{ matrix.target }}/release/huitzo ${{ matrix.asset }}
            chmod +x ${{ matrix.asset }}
          fi
        shell: bash

      # Generate SHA-256 checksum
      - name: Checksum
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            certutil -hashfile ${{ matrix.asset }} SHA256 | head -2 | tail -1 > ${{ matrix.asset }}.sha256
          else
            shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
