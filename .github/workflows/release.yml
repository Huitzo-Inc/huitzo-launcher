name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset: huitzo-x86_64-unknown-linux-musl
            cross: false
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            asset: huitzo-aarch64-unknown-linux-musl
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: huitzo-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: huitzo-aarch64-apple-darwin
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: huitzo-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # musl toolchain for static Linux builds
      - name: Install musl tools
        if: contains(matrix.target, 'musl') && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # Cross-compilation for Linux aarch64
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      # Determine binary name (huitzo on Unix, huitzo.exe on Windows)
      - name: Prepare artifact
        run: |
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cp target/${{ matrix.target }}/release/huitzo.exe ${{ matrix.asset }}
          else
            cp target/${{ matrix.target }}/release/huitzo ${{ matrix.asset }}
            chmod +x ${{ matrix.asset }}
          fi
        shell: bash

      # Generate SHA-256 checksum
      - name: Checksum
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            certutil -hashfile ${{ matrix.asset }} SHA256 | head -2 | tail -1 > ${{ matrix.asset }}.sha256
          else
            shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  update-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'v') && !startsWith(github.ref_name, 'cli-v')
    permissions:
      contents: read

    steps:
      - name: Collect SHA256 checksums from release assets
        id: shas
        run: |
          TAG="${{ github.ref_name }}"
          BASE="https://github.com/Huitzo-Inc/huitzo-launcher/releases/download/${TAG}"

          fetch_sha() {
            curl -sSfL "${BASE}/${1}.sha256" | awk '{print $1}'
          }

          echo "arm_mac=$(fetch_sha huitzo-aarch64-apple-darwin)"              >> "$GITHUB_OUTPUT"
          echo "intel_mac=$(fetch_sha huitzo-x86_64-apple-darwin)"             >> "$GITHUB_OUTPUT"
          echo "arm_linux=$(fetch_sha huitzo-aarch64-unknown-linux-musl)"      >> "$GITHUB_OUTPUT"
          echo "intel_linux=$(fetch_sha huitzo-x86_64-unknown-linux-musl)"     >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}"                                               >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: Huitzo-Inc/homebrew-tap
          token: ${{ secrets.TAP_UPDATE_TOKEN }}
          path: tap

      - name: Update formula version and checksums
        run: |
          python3 - <<'EOF'
          import re

          with open("tap/Formula/huitzo.rb") as f:
              content = f.read()

          version     = "${{ steps.shas.outputs.version }}"
          arm_mac     = "${{ steps.shas.outputs.arm_mac }}"
          intel_mac   = "${{ steps.shas.outputs.intel_mac }}"
          arm_linux   = "${{ steps.shas.outputs.arm_linux }}"
          intel_linux = "${{ steps.shas.outputs.intel_linux }}"

          content = re.sub(r'version "[^"]+"', f'version "{version}"', content)

          checksums = {
              "aarch64-apple-darwin":       arm_mac,
              "x86_64-apple-darwin":        intel_mac,
              "aarch64-unknown-linux-musl": arm_linux,
              "x86_64-unknown-linux-musl":  intel_linux,
          }
          for platform, sha in checksums.items():
              content = re.sub(
                  rf'(url "[^"]*{re.escape(platform)}[^"]*"\n(\s+))sha256 "[^"]+"',
                  rf'\1sha256 "{sha}"',
                  content,
              )

          with open("tap/Formula/huitzo.rb", "w") as f:
              f.write(content)

          print(f"Formula updated to v{version}")
          EOF

      - name: Commit and open PR
        run: |
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="auto/bump-huitzo-${{ steps.shas.outputs.version }}"
          git checkout -b "$BRANCH"
          git add Formula/huitzo.rb
          git commit -m "chore: bump huitzo launcher to v${{ steps.shas.outputs.version }}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: bump huitzo launcher to v${{ steps.shas.outputs.version }}" \
            --body "Automated formula update triggered by https://github.com/Huitzo-Inc/huitzo-launcher/releases/tag/${{ github.ref_name }}" \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.TAP_UPDATE_TOKEN }}
